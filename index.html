<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storybook Maker con Risorse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #4a90e2; --paper: #fffaf0; --secondary: #f39c12; }
        body { font-family: 'Segoe UI', serif; background: #dcdde1; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Schermata Iniziale */
        #setup-screen { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; max-width: 450px; width: 90%; }
        .upload-group { margin-bottom: 20px; text-align: left; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px dashed #ccc; border-radius: 5px; margin-top: 5px; box-sizing: border-box; }
        .start-btn { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 30px; cursor: pointer; width: 100%; margin-bottom: 20px; font-weight: bold; }
        
        /* Sezione Risorse/Download */
        .resources-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-top: 10px; }
        .resources-box h3 { margin-top: 0; font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .download-link { display: inline-block; background: var(--secondary); color: white; padding: 8px 12px; margin: 5px; border-radius: 5px; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .download-link:hover { background: #e67e22; }

        /* Schermata Libro (Resto del codice invariato) */
        #book-screen { display: none; width: 95%; max-width: 1100px; height: 85vh; background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
        .book-layout { display: flex; height: 100%; }
        .page-left { flex: 1; background: #f0f0f0; border-right: 2px solid rgba(0,0,0,0.05); }
        .page-left img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .page-right { flex: 1; background: var(--paper); padding: 40px; display: flex; flex-direction: column; justify-content: space-between; overflow-y: auto; }
        .audio-btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .pdf-btn { background: #8e44ad; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; display: none; }
        .nav-controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ddd; padding-top: 20px; }
        .btn-nav { background: #34495e; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; }

        @media (max-width: 850px) { .book-layout { flex-direction: column; } .page-left { height: 40%; } }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="color: var(--primary); margin-bottom: 10px;">📖 Storybook Maker</h1>
    <p style="color: #666; margin-bottom: 25px;">Configura la tua storia per iniziare</p>
    
    <div class="upload-group">
        <label>1. Carica il file JSON[cite: 10]:</label>
        <input type="file" id="jsonInput" accept=".json">
    </div>

    <div class="upload-group">
        <label>2. Carica le immagini (1.jpg, 2.jpg...)[cite: 5, 11]:</label>
        <input type="file" id="imageInput" accept="image/*" multiple>
    </div>

    <button class="start-btn" onclick="startStory()">Inizia Lettura 🚀</button>

    <div class="resources-box">
        <h3>Strumenti per l'Insegnante</h3>
        <p style="font-size: 0.8rem; color: #777;">Scarica i prompt da usare con l'IA per preparare i contenuti:</p>
        <a href="prompt_testo.txt" download class="download-link">📄 Prompt Testo [cite: 6, 7]</a>
        <a href="prompt_immagini.txt" download class="download-link">🎨 Prompt Immagini [cite: 1, 2]</a>
    </div>
</div>

<div id="book-screen">
    <div class="book-layout">
        <div class="page-left"><img id="chapter-img" src=""></div>
        <div class="page-right">
            <div class="text-content">
                <h2 id="chapter-title"></h2>
                <button class="audio-btn" onclick="speakText()">🔊 Leggi Capitolo</button>
                <p id="chapter-text"></p>
                <button id="downloadPdfBtn" class="pdf-btn" onclick="generatePDF()">📥 Scarica Libro Completo (PDF)</button>
            </div>
            <div class="nav-controls">
                <button id="prevBtn" class="btn-nav" onclick="changePage(-1)">Indietro</button>
                <span id="page-info"></span>
                <button id="nextBtn" class="btn-nav" onclick="changePage(1)">Avanti</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Logica JavaScript (invariata rispetto alla versione precedente)
    let storyData = [];
    let imagesMap = {}; 
    let currentIndex = 0;

    async function startStory() {
        const jsonFile = document.getElementById('jsonInput').files[0];
        const imageFiles = document.getElementById('imageInput').files;
        if (!jsonFile || imageFiles.length === 0) return alert("Carica i file necessari!");

        storyData = JSON.parse(await jsonFile.text());
        for (let file of imageFiles) {
            imagesMap[file.name] = {
                url: URL.createObjectURL(file),
                file: file
            };
        }

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('book-screen').style.display = 'block';
        renderPage();
    }

    function renderPage() {
        const chapter = storyData[currentIndex];
        const num = currentIndex + 1;
        document.getElementById('chapter-title').innerText = chapter.titolo;
        document.getElementById('chapter-text').innerText = chapter.testo;
        document.getElementById('page-info').innerText = `Pagina ${num} di ${storyData.length}`;
        const imgEntry = imagesMap[`${num}.jpg`] || imagesMap[`${num}.png`];
        document.getElementById('chapter-img').src = imgEntry ? imgEntry.url : "";
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === storyData.length - 1;
        document.getElementById('downloadPdfBtn').style.display = (currentIndex === storyData.length - 1) ? 'block' : 'none';
        window.speechSynthesis.cancel();
    }

    function changePage(step) { currentIndex += step; renderPage(); }

    function speakText() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(storyData[currentIndex].testo);
        utterance.lang = 'it-IT';
        window.speechSynthesis.speak(utterance);
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        for (let i = 0; i < storyData.length; i++) {
            if (i > 0) doc.addPage();
            const chapter = storyData[i];
            const imgEntry = imagesMap[`${i+1}.jpg`] || imagesMap[`${i+1}.png`];
            if (imgEntry) {
                const imgData = await fileToDataURL(imgEntry.file);
                doc.addImage(imgData, 'JPEG', 10, 20, 130, 160, null, 'FAST');
            }
            doc.setFont("times", "bold");
            doc.setFontSize(22);
            doc.text(chapter.titolo, 150, 30);
            doc.setFont("times", "normal");
            doc.setFontSize(14);
            const splitText = doc.splitTextToSize(chapter.testo, 130);
            doc.text(splitText, 150, 50);
        }
        doc.save("il-mio-storybook.pdf");
    }

    function fileToDataURL(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
